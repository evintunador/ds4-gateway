# ds4-gateway configuration

[gateway]
host = "127.0.0.1"   # only tailscale serve / local processes can reach it
port = 9001          # blue = 9001, green = 9002
state_file = "state.json"

[owner]
login = "evintunador@github"   # tailscale login; always bypasses the power gate

[power]
min_battery_percent = 80
poll_interval_s = 10

[model]
ds4_dir = "/Users/evintunador/dev/ds4"
server_bin = "./ds4-server"
model_file = "ds4flash.gguf"
host = "127.0.0.1"
port = 8001          # red = 8001, yellow = 8002
args = ["--metal", "--ctx", "100000"]
managed = true       # gateway owns the ds4-server process lifecycle
autostart = true     # load the model when the gateway starts (unless disabled state persisted)
health_timeout_s = 1800
log_file = "logs/ds4-server.log"

[scheduler]
default_weight = 1
sticky_extra_turns = 2      # consecutive turns a user may take while others wait (KV prefix cache reuse)
max_queued_per_user = 4
queue_timeout_s = 600

[scheduler.weights]
"evintunador@github" = 4
